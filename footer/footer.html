<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>footer</title>
    <link rel="stylesheet" href="main.css">
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/4.0.0/uicons-brands/css/uicons-brands.css'>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/4.0.0/uicons-regular-straight/css/uicons-regular-straight.css'>
</head>
<body>
    <!-- footer.html -->
<footer class="footer">
  <div class="footer-container">

    <!-- Left side -->
    <div class="footer-left">
      <div class="logo">
        <img src="./brand2-thinkapt.png" alt="Nexcent Logo">
        <h2>Nexcent</h2>
      </div>

      <p>Copyright © 2020 Nexcent ltd.<br>All rights reserved</p>

      <div class="social-icons">
        <i class="fi fi-brands-instagram"></i>
        <i class="fi fi-brands-twitter"></i>
        <i class="fi fi-brands-dribbble"></i>
        <i class="fi fi-brands-youtube"></i>
      </div>
    </div>

    <!-- Company -->
    <div class="footer-column">
      <h3>Company</h3>
      <ul>
        <li><a href="#">About us</a></li>
        <li><a href="#">Blog</a></li>
        <li><a href="#">Contact us</a></li>
        <li><a href="#">Pricing</a></li>
        <li><a href="#">Testimonials</a></li>
      </ul>
    </div>

    <!-- Support -->
    <div class="footer-column">
      <h3>Support</h3>
      <ul>
        <li><a href="#">Help center</a></li>
        <li><a href="#">Terms of service</a></li>
        <li><a href="#">Legal</a></li>
        <li><a href="#">Privacy policy</a></li>
        <li><a href="#">Status</a></li>
      </ul>
    </div>

    <!-- Newsletter -->
    <div class="footer-column">
      <h3>Stay up to date</h3>
      <div class="newsletter">
        <input type="email" placeholder="Your email address">
        <button type="submit"><i class="fi fi-rs-paper-plane"></i></button>
      </div>
    </div>

  </div>
</footer>
</body>
</html>
